<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopMaster - Iniciar Sesión</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-primary: #3b5bff;
            --color-primary-hover: #334bdb;
            --color-primary-active: #2a3cb8;
            --color-error: #ef4444;
            --color-success: #10b981;
            --color-bg: #f1f5f9;
            --color-text: #1e293b;
            --color-muted: #94a3b8;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.10);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--color-text);
        }

        .auth-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 1rem;
        }

        .logo-container {
            margin-bottom: 1.5rem;
        }

        .logo-container img {
            height: 64px;
            max-width: 100%;
            object-fit: contain;
            display: block;
        }

        main {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2.5rem 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 1.45rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            color: var(--color-text);
            text-align: center;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--color-muted);
            margin-bottom: 1.75rem;
            text-align: center;
        }

        /* Alert messages */
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert-error {
            background-color: #fef2f2;
            color: var(--color-error);
            border: 1px solid #fecaca;
        }

        .alert-success {
            background-color: #d1fae5;
            color: var(--color-success);
            border: 1px solid #a7f3d0;
        }

        .alert svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 0.7rem 1rem;
            background-color: #fff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(59, 91, 255, 0.12);
        }

        .input-wrapper svg {
            width: 17px;
            height: 17px;
            color: var(--color-muted);
            margin-right: 0.65rem;
            flex-shrink: 0;
        }

        .form-input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 0.925rem;
            font-family: 'Inter', sans-serif;
            color: var(--color-text);
            background-color: transparent;
        }

        .form-input::placeholder {
            color: var(--color-muted);
        }

        .password-toggle {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--color-muted);
            padding: 0;
            display: flex;
            align-items: center;
            transition: color 0.15s ease;
        }

        .password-toggle:hover {
            color: var(--color-text);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.45rem;
        }

        .form-checkbox {
            width: 15px;
            height: 15px;
            accent-color: var(--color-primary);
            cursor: pointer;
        }

        .checkbox-label {
            color: var(--color-text);
            cursor: pointer;
        }

        .forgot-password-link {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            transition: opacity 0.15s ease;
        }

        .forgot-password-link:hover {
            opacity: 0.75;
            text-decoration: underline;
        }

        /* ── Botón mejorado ── */
        .btn-primary {
            width: 100%;
            padding: 0.8rem 1.5rem;
            background: var(--color-primary);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            letter-spacing: 0.01em;
            transition: background 0.18s ease, transform 0.12s ease, box-shadow 0.18s ease;
            box-shadow: 0 4px 14px rgba(59, 91, 255, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
            box-shadow: 0 6px 20px rgba(59, 91, 255, 0.45);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            background: var(--color-primary-active);
            box-shadow: 0 2px 8px rgba(59, 91, 255, 0.3);
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }


        /* ── Footer ── */
        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--color-muted);
        }

        .footer-text a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: var(--color-error);
            font-size: 0.78rem;
            margin-top: 0.3rem;
        }

        @media (max-width: 640px) {
            .logo-container img { height: 52px; }
            main { padding: 1.75rem 1.5rem; border-radius: 12px; }
            h1 { font-size: 1.2rem; }
        }

        @media (max-width: 420px) {
            .logo-container img { height: 44px; }
            main { padding: 1.5rem 1.1rem; }
            h1 { font-size: 1.1rem; }
        }
    </style>
</head>

<body>
<div class="auth-wrapper">

    <div class="logo-container">
        <a href="/home">
            <img src="/images/logo-nav.png" alt="Logo de ShopMaster" />
        </a>
    </div>

    <main>
        <h1>Bienvenido de vuelta</h1>
        <p class="subtitle">Inicia sesión para acceder a tu panel de control</p>

        <div th:if="${param.error}" class="alert alert-error" role="alert">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span>Usuario o contraseña incorrectos. Por favor, inténtalo de nuevo.</span>
        </div>

        <div th:if="${param.logout}" class="alert alert-success" role="alert">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span>Has cerrado sesión correctamente.</span>
        </div>

        <form th:action="@{/login}" method="post" id="loginForm">

            <div class="form-group">
                <div class="input-wrapper">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <input type="email" id="email" name="email" placeholder="Correo electrónico"
                           class="form-input" required autocomplete="email">
                </div>
                <div class="error-message" id="email-error"></div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    <input type="password" id="password" name="password" class="form-input"
                           placeholder="Contraseña" required autocomplete="current-password">
                    <button type="button" class="password-toggle" id="togglePassword"
                            aria-label="Mostrar u ocultar contraseña">
                        <svg id="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                             width="17" height="17" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
                <div class="error-message" id="password-error"></div>
            </div>

            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember-me" name="remember-me" class="form-checkbox">
                    <label for="remember-me" class="checkbox-label">Recordarme</label>
                </div>
                <a href="#" class="forgot-password-link">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">
                Iniciar Sesión
            </button>
        </form>

        <p class="footer-text">
            ¿No tienes una cuenta? <a th:href="@{/register}">Regístrate aquí</a>
        </p>
    </main>

</div>

<script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput  = document.getElementById('password');
    const eyeIcon        = document.getElementById('eye-icon');

    const eyePath = 'M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z';
    const eyeOffPath = 'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21';

    togglePassword.addEventListener('click', function () {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';

        eyeIcon.innerHTML = isPassword
            ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${eyeOffPath}"/>`
            : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${eyePath}"/>`;
    });
</script>
</body>

</html>
