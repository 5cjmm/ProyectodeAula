<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopMaster - Mis Tiendas</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<!-- ✅ FIX 1: un solo <body>, el segundo <body> anidado fue eliminado -->
<body class="min-h-screen bg-gray-50">
<div class="flex min-h-screen">

    <!-- Main Content -->
    <div class="flex-1 flex flex-col">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 shadow-sm">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <h1 class="text-xl font-semibold text-gray-800">Gestion de Tiendas</h1>
                <div class="relative">
                    <button id="userMenuButton"
                            class="flex items-center gap-3 px-3 py-2 bg-gray-50 rounded-lg border border-gray-200 hover:bg-gray-100 transition">
                        <div
                                class="w-9 h-9 rounded-full border-2 border-gray-300 bg-gray-100 flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="26" height="26">
                                <path fill="none"
                                      d="M8.007 24.93A4.996 4.996 0 0 1 13 20h6a4.996 4.996 0 0 1 4.993 4.93a11.94 11.94 0 0 1-15.986 0M20.5 12.5A4.5 4.5 0 1 1 16 8a4.5 4.5 0 0 1 4.5 4.5" />
                                <path fill="#0891b2"
                                      d="M26.749 24.93A13.99 13.99 0 1 0 2 16a13.9 13.9 0 0 0 3.251 8.93l-.02.017c.07.084.15.156.222.239c.09.103.187.2.28.3q.418.457.87.87q.14.124.28.242q.48.415.99.782c.044.03.084.069.128.1v-.012a13.9 13.9 0 0 0 16 0v.012c.044-.031.083-.07.128-.1q.51-.368.99-.782q.14-.119.28-.242q.451-.413.87-.87c.093-.1.189-.197.28-.3c.071-.083.152-.155.222-.24ZM16 8a4.5 4.5 0 1 1-4.5 4.5A4.5 4.5 0 0 1 16 8M8.007 24.93A4.996 4.996 0 0 1 13 20h6a4.996 4.996 0 0 1 4.993 4.93a11.94 11.94 0 0 1-15.986 0" />
                            </svg>
                        </div>
                        <span id="userGreeting" th:text="'Hola, ' + ${usuario.username}"
                              class="text-sm font-medium text-gray-700">
                                Hola, Usuario
                            </span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                            <path fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round"
                                  stroke-width="1.5" d="m6 9l6 6l6-6" />
                        </svg>
                    </button>

                    <div id="userDropdown"
                         class="absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-lg shadow-lg opacity-0 translate-y-[-10px] scale-95 pointer-events-none transition-all duration-200 z-50">
                        <button id="logoutBtn"
                                class="w-full text-left flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                                <g fill="none">
                                    <path fill="#f00034"
                                          d="M12 3a1 1 0 0 1 .117 1.993L12 5H7a1 1 0 0 0-.993.883L6 6v12a1 1 0 0 0 .883.993L7 19h4.5a1 1 0 0 1 .117 1.993L11.5 21H7a3 3 0 0 1-2.995-2.824L4 18V6a3 3 0 0 1 2.824-2.995L7 3zm5.707 5.464l2.828 2.829a1 1 0 0 1 0 1.414l-2.828 2.829a1 1 0 1 1-1.414-1.415L17.414 13H12a1 1 0 1 1 0-2h5.414l-1.121-1.121a1 1 0 0 1 1.414-1.415" />
                                </g>
                            </svg>
                            Cerrar sesión
                        </button>
                    </div>
                </div>
            </div><!-- ✅ FIX 2: faltaba cerrar el div.max-w-7xl del header -->
        </header><!-- ✅ FIX 3: faltaba cerrar </header> correctamente -->

        <!-- Main Content -->
        <div class="max-w-4xl mx-auto px-6 py-12 w-full">
            <!-- Page Title -->
            <div class="text-center mb-12">
                <h1 class="text-4xl font-bold text-gray-900 mb-4">Mis Tiendas</h1>
                <p class="text-lg text-gray-600">Gestiona todas tus tiendas desde un solo lugar</p>
            </div>

            <!-- Create Store Form -->
            <div class="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
                <div class="bg-gradient-to-r from-blue-600 to-cyan-600 px-8 py-6">
                    <h2 class="text-2xl font-bold text-white mb-2">Crear Nueva Tienda</h2>
                    <p class="text-blue-100">Agrega una nueva tienda a tu red de negocios</p>
                </div>

                <div class="p-8">
                    <form id="formTienda" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Store Name -->
                            <div class="space-y-2">
                                <label for="nombre" class="block text-sm font-semibold text-gray-700">
                                    Nombre de la tienda
                                </label>
                                <div class="relative">
                                    <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 h-5 w-5 text-gray-400"
                                         fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                                        </path>
                                    </svg>
                                    <input type="text" id="nombre" placeholder="Nombre de la tienda"
                                           class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-colors">
                                </div>
                            </div>

                            <!-- Address -->
                            <div class="space-y-2">
                                <label for="direccion" class="block text-sm font-semibold text-gray-700">
                                    Dirección
                                </label>
                                <div class="relative">
                                    <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 h-5 w-5 text-gray-400"
                                         fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                              d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z">
                                        </path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                              d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    </svg>
                                    <input type="text" id="direccion" placeholder="Direccion de la tienda"
                                           class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-colors">
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- NIT -->
                            <div class="space-y-2">
                                <label for="nit" class="block text-sm font-semibold text-gray-700">
                                    NIT
                                </label>
                                <div class="relative">
                                    <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 h-5 w-5 text-gray-400"
                                         fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                                        </path>
                                    </svg>
                                    <input type="text" id="nit" placeholder="NIT de la tienda" required
                                           class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-colors">
                                </div>
                            </div>

                            <!-- Business Type -->
                            <div class="space-y-2">
                                <label for="tipo" class="block text-sm font-semibold text-gray-700">
                                    Tipo de negocio
                                </label>
                                <div class="relative">
                                    <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 h-5 w-5 text-gray-400"
                                         fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                                        </path>
                                    </svg>
                                    <select id="tipo"
                                            class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-colors appearance-none bg-white">
                                        <option value="">Seleccione el tipo...</option>
                                        <option value="TIENDA">Tienda de Barrio</option>
                                        <option value="PAPELERIA/VARIEDADES">Papelería/Variedades</option>
                                    </select>
                                    <svg class="absolute right-3 top-1/2 transform -translate-y-1/2 h-5 w-5 text-gray-400 pointer-events-none"
                                         fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                              d="M19 9l-7 7-7-7"></path>
                                    </svg>
                                </div>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="pt-6">
                            <button type="submit"
                                    class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 text-white font-bold py-4 px-8 rounded-lg shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center space-x-2">
                                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                                </svg>
                                <span>Crear Tienda</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mt-12 bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
                <!-- Header -->
                <div class="bg-gray-50 px-8 py-4 border-b border-gray-200 flex items-center space-x-2">
                    <svg class="h-5 w-5 text-cyan-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                        </path>
                    </svg>
                    <h3 class="text-lg font-semibold text-gray-900">Tiendas Registradas</h3>
                </div>

                <div id="listaTiendas"
                     class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-8 transition-all">
                </div>

                <div id="emptyState" class="p-12 text-center text-gray-500 hidden">
                    <svg class="mx-auto h-16 w-16 text-gray-300 mb-4" fill="none" stroke="currentColor"
                         viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                        </path>
                    </svg>
                    <p class="text-lg">No tienes tiendas registradas aún</p>
                    <p class="text-gray-400 text-sm mt-2">Crea tu primera tienda usando el formulario de arriba</p>
                </div>
            </div>

        </div><!-- cierre div.max-w-4xl -->
    </div><!-- cierre div.flex-1 -->
</div><!-- cierre div.flex.min-h-screen -->

<!-- ✅ FIX 4: <script> movido fuera del contenido, justo antes de </body> -->
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("formTienda");
        const lista = document.getElementById("listaTiendas");
        const emptyState = document.getElementById("emptyState");

        const button = document.getElementById("userMenuButton");
        const dropdown = document.getElementById("userDropdown");
        const logoutBtn = document.getElementById("logoutBtn");

        button.addEventListener("click", (e) => {
            e.stopPropagation();
            const isVisible = dropdown.classList.contains("opacity-100");
            dropdown.classList.toggle("opacity-100", !isVisible);
            dropdown.classList.toggle("translate-y-0", !isVisible);
            dropdown.classList.toggle("scale-100", !isVisible);
            dropdown.classList.toggle("pointer-events-none", isVisible);
            dropdown.classList.toggle("opacity-0", isVisible);
            dropdown.classList.toggle("translate-y-[-10px]", isVisible);
            dropdown.classList.toggle("scale-95", isVisible);
        });

        document.addEventListener("click", (e) => {
            if (!dropdown.contains(e.target) && !button.contains(e.target)) {
                dropdown.classList.add("opacity-0", "translate-y-[-10px]", "scale-95", "pointer-events-none");
                dropdown.classList.remove("opacity-100", "translate-y-0", "scale-100");
            }
        });

        logoutBtn.addEventListener("click", () => {
            if (confirm("¿Deseas cerrar sesión?")) {
                window.location.href = "/logout";
            }
        });

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const submitBtn = form.querySelector('button[type="submit"]');
            const btnText = submitBtn.querySelector('.btn-text');
            const btnLoading = submitBtn.querySelector('.btn-loading');

            if (btnText && btnLoading) {
                btnText.style.display = 'none';
                btnLoading.style.display = 'inline';
            }
            submitBtn.disabled = true;

            const tienda = {
                nombre: document.getElementById("nombre").value.trim(),
                direccion: document.getElementById("direccion").value.trim(),
                nit: document.getElementById("nit").value.trim(),
                tipo: document.getElementById("tipo").value
            };

            try {
                const resp = await fetch("/api/tiendas", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(tienda)
                });

                const msg = await resp.text();

                if (!resp.ok) {
                    if (msg.toLowerCase().includes("nit")) {
                        showNotification("El NIT ya está registrado", "warning");
                    } else {
                        showNotification("Error al guardar: " + msg, "error");
                    }
                    return;
                }

                form.reset();
                await cargarTiendas();
                showNotification("Tienda creada exitosamente", "success");

            } catch (error) {
                console.error("Error de conexión:", error);
                showNotification("Error de conexión con el servidor", "error");
            } finally {
                if (btnText && btnLoading) {
                    btnText.style.display = 'inline';
                    btnLoading.style.display = 'none';
                }
                submitBtn.disabled = false;
            }
        });

        async function cargarTiendas() {
            try {
                const resp = await fetch("/api/tiendas");
                if (!resp.ok) throw new Error("Error al cargar tiendas");
                const tiendas = await resp.json();

                lista.innerHTML = "";

                if (!Array.isArray(tiendas) || tiendas.length === 0) {
                    emptyState.classList.remove("hidden");
                    return;
                }

                emptyState.classList.add("hidden");

                tiendas.forEach(t => {
                    const card = document.createElement("div");
                    card.className = "p-5 border border-gray-200 rounded-lg bg-white shadow-sm hover:shadow-md transition";
                    card.innerHTML = `
                        <h3 class="text-lg font-semibold text-gray-800 mb-1">${t.nombre}</h3>
                        <p class="text-gray-600 text-sm mb-1"><svg xmlns="http://www.w3.org/2000/svg" class="inline h-4 w-4 mr-1 align-text-bottom" viewBox="0 0 24 24"><path fill="#e21d1d" d="M12 21a29.776 29.776 0 0 1-3.5-3.531C6.9 15.558 5 12.712 5 10a7 7 0 0 1 11.952-4.951A6.955 6.955 0 0 1 19 10c0 2.712-1.9 5.558-3.5 7.469A29.777 29.777 0 0 1 12 21Zm0-14a3 3 0 1 0 0 6a3 3 0 0 0 0-6Z"/></svg> ${t.direccion}</p>
                        <p class="text-gray-600 text-sm mb-1">NIT: ${t.nit}</p>
                        <p class="text-gray-600 text-sm mb-3">Tipo: ${t.tipo}</p>
                      <a href="/tiendas/${t.id}/dashboard"
                      class="inline-flex items-center gap-2 text-cyan-600 hover:text-cyan-800 font-medium text-sm transition">

                     <!-- Icono tienda -->
                     <svg xmlns="http://www.w3.org/2000/svg"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke-width="1.8"
                     stroke="currentColor"
                     class="w-5 h-5">
                    <path stroke-linecap="round"
                     stroke-linejoin="round"
                     d="M3 9.75L4.5 4.5h15L21 9.75M4.5 9.75V18a1.5 1.5 0 001.5 1.5h12A1.5 1.5 0 0019.5 18V9.75M9 13.5h6" />
                     </svg>
                       Ver Tienda
                     </a>
                    `;
                    lista.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                showNotification("No se pudieron cargar las tiendas", "error");
            }
        }

        function showNotification(msg, type) {
            const colors = { success: "bg-green-500", error: "bg-red-500", warning: "bg-yellow-500" };

            const notification = document.createElement("div");
            notification.className = `fixed top-20 right-5 px-4 py-3 rounded-lg shadow-lg text-white font-semibold z-50 transition transform duration-300 ${colors[type] || "bg-gray-700"}`;
            notification.textContent = msg;

            document.body.appendChild(notification);

            requestAnimationFrame(() => {
                notification.classList.remove("opacity-0", "translate-y-[-10px]");
                notification.classList.add("opacity-100", "translate-y-0");
            });

            setTimeout(() => {
                notification.classList.remove("opacity-100", "translate-y-0");
                notification.classList.add("opacity-0", "translate-y-[-10px]");
                setTimeout(() => notification.remove(), 500);
            }, 3000);
        }

        cargarTiendas();
    });
</script>

</body>

</html>
